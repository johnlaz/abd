<style>
  :root{
    --radius-lg:18px; --radius-md:12px; --radius-sm:8px;
  }
  /* Dark theme (default) */
  :root, :root[data-theme="dark"]{
    --gold:#E8C97A; --teal:#4FD1C5;
    --bg-a:#0B0F14; --bg-b:#151b24;
    --text:#E4E9ED; --text-dim:rgba(228,233,237,.55);
    --glass-bg:rgba(24,30,38,.55); --glass-bg-strong:rgba(20,25,32,.72);
    --glass-border:rgba(255,255,255,.10); --glass-highlight:rgba(255,255,255,.07);
    --shadow:0 8px 32px rgba(0,0,0,.45); --shadow-sm:0 2px 10px rgba(0,0,0,.3);
    --input-bg:rgba(255,255,255,.06); --hover-bg:rgba(255,255,255,.08);
    --canvas-bg:#1a1f26;
    --icon-filter:none;
  }
  /* Light theme — deeper accent colors (the bright dark-mode gold/teal wash out
     on light backgrounds), and a dimmer, warmer base so glass panels read as
     distinct surfaces instead of blending into stark white. */
  :root[data-theme="light"]{
    --gold:#96650E; --teal:#0A7A6E;
    --bg-a:#D6DBE2; --bg-b:#C5CCD6;
    --text:#141922; --text-dim:rgba(20,25,34,.62);
    --glass-bg:rgba(255,255,255,.58); --glass-bg-strong:rgba(255,255,255,.82);
    --glass-border:rgba(15,20,30,.16); --glass-highlight:rgba(255,255,255,.9);
    --shadow:0 8px 32px rgba(15,20,30,.18); --shadow-sm:0 2px 10px rgba(15,20,30,.12);
    --input-bg:rgba(15,20,30,.06); --hover-bg:rgba(15,20,30,.09);
    --canvas-bg:#e9ecef;
    --icon-filter:brightness(.6) saturate(1.3);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;color:var(--text);font-family:'DM Sans',sans-serif;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(232,201,122,.12), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(79,209,197,.10), transparent 45%),
      linear-gradient(160deg, var(--bg-a), var(--bg-b));
    background-attachment:fixed;
    transition:background-color .2s ease, color .2s ease;
  }
  h1,h2,h3{font-family:'Playfair Display',serif;color:var(--gold);margin:0;}
  button{font-family:inherit;cursor:pointer;}
  #app{height:100vh;display:flex;flex-direction:column;}

  /* Glass surface — shared treatment for topbar, sidebars, modals, cards */
  .glass{
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(22px) saturate(180%);
    backdrop-filter:blur(22px) saturate(180%);
    border:1px solid var(--glass-border);
    box-shadow:var(--shadow), inset 0 1px 0 var(--glass-highlight);
  }

  /* Topbar */
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px;flex-wrap:wrap;
    margin:12px 12px 0 12px;border-radius:var(--radius-lg);position:relative;z-index:5;}
  #topbar h1{font-size:19px;}
  .btn{background:var(--input-bg);border:1px solid var(--glass-border);color:var(--text);border-radius:999px;padding:7px 14px;font-size:12.5px;transition:.15s;}
  .btn:hover{background:var(--hover-bg);transform:translateY(-1px);}
  .btn.primary{background:var(--gold);color:#1a1508;border-color:var(--gold);font-weight:600;box-shadow:0 4px 14px rgba(232,201,122,.35);}
  .btn.primary:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  #autosave-status{font-size:11px;color:var(--text-dim);min-width:90px;text-align:right;}

  .dropdown-menu button:hover, .dropdown-menu label:hover{background:var(--hover-bg);}
  .dropdown-menu .field{padding:2px 4px;}

    border:1px solid var(--glass-border);border-radius:999px;padding:10px 18px;font-size:12.5px;color:var(--text);opacity:0;transition:opacity .25s;pointer-events:none;z-index:100;box-shadow:var(--shadow);}

</style>

<script>
(function(){
"use strict";

/* ---------------------------------------------------------------------
   THEME — defaults to system preference; user choice persists locally
   and overrides system until they pick "system" again.
--------------------------------------------------------------------- */
function applyTheme(choice){
  const effective = choice === "system"
    ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : choice;
  document.documentElement.setAttribute("data-theme", effective);
  document.querySelectorAll("#theme-toggle button").forEach(b =>
    b.classList.toggle("active", b.dataset.themeChoice === choice));
}
function currentThemeChoice(){
  return localStorage.getItem("aimav-theme") || "system";
}
document.querySelectorAll("#theme-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    const choice = btn.dataset.themeChoice;
    if (choice === "system") localStorage.removeItem("aimav-theme");
    else localStorage.setItem("aimav-theme", choice);
    applyTheme(choice);
  });
});
applyTheme(currentThemeChoice());
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  if (currentThemeChoice() === "system") applyTheme("system");
});

/* ---------------------------------------------------------------------
   CDN LOAD GUARD — fail loud instead of silently leaving the UI blank
--------------------------------------------------------------------- */
const missing = [];
if (typeof Dexie === "undefined") missing.push("Dexie");
if (typeof Konva === "undefined") missing.push("Konva");
if (typeof html2canvas === "undefined") missing.push("html2canvas");
if (missing.length) {
  document.body.innerHTML =
    '<div style="padding:40px;font-family:sans-serif;color:#CBD5D9;background:#0B0F14;height:100vh;">' +
    '<h2 style="color:#E8C97A;">Couldn\u2019t load required libraries</h2>' +
    '<p>' + missing.join(", ") + ' failed to load from the CDN. Check your internet connection and refresh. ' +
    'If this keeps happening, the CDN may be blocked on this network.</p></div>';
  throw new Error("Missing dependencies: " + missing.join(", "));
}

/* ---------------------------------------------------------------------
   DATABASE
--------------------------------------------------------------------- */
const db = new Dexie("AimAvDB");
db.version(1).stores({
  assets: "++id, name, category, source, createdAt",
  projects: "++id, name, updatedAt",
  settings: "id"
});
db.version(2).stores({
  assets: "++id, name, category, source, createdAt",
  projects: "++id, name, updatedAt",
  settings: "id",
  renders: "++id, name, createdAt"
});
db.on("populate", () => {
  db.settings.put({ id: "app", defaultCompanyName: "", lastProjectId: 1 });
});

const PROJECT_ID = 1; // single always-on project for the local-first MVP
const STAGE_W = 1400, STAGE_H = 900;
const HISTORY_LIMIT = 50;

/* ---------------------------------------------------------------------
   STATE
--------------------------------------------------------------------- */
const state = {
  baseImageBlob: null,
  layout: [],                 // [{instanceId, assetId, x, y, width, height, rotation, zIndex}]
  meta: { companyName:"", clientName:"", notes:"", showMetadata:true, showWatermark:false, aiNotes:"", quickRenderNotes:"", includeBomOverlay:false },
  history: [], historyIndex: -1,
  dirty: false,
  selectedInstanceIds: new Set(),
};

let saveTimer = null;
function markDirty(){
  state.dirty = true;
  setStatus("Unsaved changes…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveProject, 500); // debounced autosave
}

function pushHistory(){
  const snapshot = JSON.parse(JSON.stringify(state.layout));
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.history.push(snapshot);
  if (state.history.length > HISTORY_LIMIT) state.history.shift();
  state.historyIndex = state.history.length - 1;
  updateUndoRedoButtons();
}

function undo(){
  if (state.historyIndex <= 0) return;
  state.historyIndex--;
  restoreLayoutSnapshot(state.history[state.historyIndex]);
}
function redo(){
  if (state.historyIndex >= state.history.length - 1) return;
  state.historyIndex++;
  restoreLayoutSnapshot(state.history[state.historyIndex]);
}
function restoreLayoutSnapshot(snapshot){
  state.layout = JSON.parse(JSON.stringify(snapshot));
  state.selectedInstanceIds.clear();
  rebuildCanvasNodes();
  renderBOM();
  updateUndoRedoButtons();
  markDirty();
}
function updateUndoRedoButtons(){
  document.getElementById("undo-btn").disabled = state.historyIndex <= 0;
  document.getElementById("redo-btn").disabled = state.historyIndex >= state.history.length - 1;
}

/* ---------------------------------------------------------------------
   PERSISTENCE (autosave / load)
--------------------------------------------------------------------- */
async function saveProject(){
  await db.projects.put({
    id: PROJECT_ID,
    name: "Active Project",
    baseImage: state.baseImageBlob || null,
    layout: state.layout,
    meta: state.meta,
    updatedAt: Date.now()
  });
  state.dirty = false;
  setStatus("Saved " + new Date().toLocaleTimeString());
}

async function loadProject(){
  const proj = await db.projects.get(PROJECT_ID);
  if (!proj) { setStatus("Ready"); syncBomOverlayUI(); return; }
  state.baseImageBlob = proj.baseImage || null;
  state.layout = proj.layout || [];
  state.meta = proj.meta ? { ...state.meta, ...proj.meta } : state.meta;
  if (state.baseImageBlob) await setBaseImage(state.baseImageBlob, false);
  await rebuildCanvasNodes();
  pushHistory();
  renderBOM();
  syncBomOverlayUI();
  setStatus("Loaded");
}

function setStatus(text){
  document.getElementById("autosave-status").textContent = text;
}

/* ---------------------------------------------------------------------
   UNSAVED CHANGES GUARD
--------------------------------------------------------------------- */
window.addEventListener("beforeunload", (e) => {
  if (!state.dirty) return;
  e.preventDefault();
  e.returnValue = "";
});

/* ---------------------------------------------------------------------
   KONVA STAGE
--------------------------------------------------------------------- */
const stageContainer = document.getElementById("stage-container");
stageContainer.style.width = STAGE_W + "px";
stageContainer.style.height = STAGE_H + "px";

const stage = new Konva.Stage({ container: "stage-container", width: STAGE_W, height: STAGE_H });
const baseLayer = new Konva.Layer();
const itemLayer = new Konva.Layer();
stage.add(baseLayer);
stage.add(itemLayer);

const transformer = new Konva.Transformer({ rotateEnabled:true, keepRatio:false,
  boundBoxFunc:(oldBox,newBox)=> (newBox.width<20||newBox.height<20) ? oldBox : newBox });
itemLayer.add(transformer);

let baseImageNode = null;
const konvaNodesByInstanceId = new Map();

/* Marquee (rubber-band) select: drag on empty canvas to select multiple
   items at once. Plain click-and-release with no drag just clears selection. */
const selectionRect = new Konva.Rect({
  fill: "rgba(232,201,122,0.15)", stroke: "#E8C97A", strokeWidth: 1, visible: false, listening: false
});
itemLayer.add(selectionRect);
let marqueeActive = false;
let marqueeStart = null;
let marqueeMoved = false;

stage.on("mousedown touchstart", (e) => {
  if (e.target !== stage) return; // clicked an item — its own click handler deals with selection
  marqueeStart = stage.getRelativePointerPosition();
  marqueeActive = true;
  marqueeMoved = false;
  selectionRect.setAttrs({ x: marqueeStart.x, y: marqueeStart.y, width: 0, height: 0, visible: false });
});
stage.on("mousemove touchmove", () => {
  if (!marqueeActive) return;
  const pos = stage.getRelativePointerPosition();
  if (!marqueeMoved && (Math.abs(pos.x - marqueeStart.x) > 3 || Math.abs(pos.y - marqueeStart.y) > 3)) {
    marqueeMoved = true;
    selectionRect.visible(true);
  }
  if (!marqueeMoved) return;
  selectionRect.setAttrs({
    x: Math.min(marqueeStart.x, pos.x), y: Math.min(marqueeStart.y, pos.y),
    width: Math.abs(pos.x - marqueeStart.x), height: Math.abs(pos.y - marqueeStart.y)
  });
  itemLayer.batchDraw();
});
stage.on("mouseup touchend", (e) => {
  if (!marqueeActive) return;
  marqueeActive = false;
  selectionRect.visible(false);
  if (!marqueeMoved) {
    // plain click on empty canvas — clear selection
    clearSelection();
    itemLayer.batchDraw();
    return;
  }
  const box = selectionRect.getClientRect();
  const hit = [];
  konvaNodesByInstanceId.forEach((node, id) => {
    if (Konva.Util.haveIntersection(box, node.getClientRect())) hit.push(id);
  });
  state.selectedInstanceIds = new Set(hit);
  refreshTransformerSelection();
  itemLayer.batchDraw();
});

/* ---------------------------------------------------------------------
   ZOOM
   Uses Konva's own stage.scale() (not a CSS transform) so pointer/drag
   coordinates from Konva's built-in event system stay correct automatically.
   Panning is just the browser's native scrollbar on #canvas-area.
--------------------------------------------------------------------- */
let zoomLevel = 1;
const ZOOM_MIN = 0.15, ZOOM_MAX = 3;

function applyZoom(newZoom){
  zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  stage.scale({ x: zoomLevel, y: zoomLevel });
  stage.width(STAGE_W * zoomLevel);
  stage.height(STAGE_H * zoomLevel);
  stageContainer.style.width = (STAGE_W * zoomLevel) + "px";
  stageContainer.style.height = (STAGE_H * zoomLevel) + "px";

async function setBaseImage(blob, autosave = true){

  baseLayer.draw();
  document.getElementById("canvas-hint").style.display = "none";

function loadHtmlImage(blob){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

async function addPlacedItem(asset, x, y){
  const instanceId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
  const item = {
    instanceId, assetId: asset.id,
    x, y,
    width: asset.defaultWidth || 160, height: asset.defaultHeight || 160,
    rotation: 0, flipX: false, flipY: false, zIndex: state.layout.length
  };
  state.layout.push(item);
  await addKonvaNodeForItem(item, asset.image);
  pushHistory();
  renderBOM();
  markDirty();
}

// Mirroring is done by pre-drawing a flipped copy of the source image onto a
// canvas, rather than using Konva's scaleX/scaleY(-1). Keeping flip separate
// from the Transformer's own scale-based resize math avoids the handle and
// bounding-box glitches that negative scale values tend to cause.
function applyFlip(img, flipX, flipY){
  if (!flipX && !flipY) return img;
  const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.translate(flipX ? w : 0, flipY ? h : 0);
  ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  ctx.drawImage(img, 0, 0);
  return canvas;
}

async function addKonvaNodeForItem(item, imageBlob){
  let blob = imageBlob;
  if (!blob) {
    const asset = await db.assets.get(item.assetId);
    if (!asset) return;
    blob = asset.image;
  }
  const img = await loadHtmlImage(blob);
  const node = new Konva.Image({
    image: applyFlip(img, item.flipX, item.flipY),
    x:item.x, y:item.y, width:item.width, height:item.height,
    rotation:item.rotation, draggable:true
  });
  node._sourceImg = img; // keep the unflipped original so we can re-flip on toggle
  node.on("click tap", (e) => selectNode(node, item.instanceId, e.evt.shiftKey));

  // Group drag: when this node is part of a multi-selection, dragging it moves
  // every other selected item by the same delta. Positions are snapshotted at
  // dragstart so the delta is computed relative to that, not accumulated error.
  let dragStartSnapshot = null;
  node.on("dragstart", () => {
    if (state.selectedInstanceIds.size > 1 && state.selectedInstanceIds.has(item.instanceId)) {
      dragStartSnapshot = { selfX: node.x(), selfY: node.y(), others: [] };
      state.selectedInstanceIds.forEach(id => {
        if (id === item.instanceId) return;
        const otherNode = konvaNodesByInstanceId.get(id);
        if (otherNode) dragStartSnapshot.others.push({ node: otherNode, startX: otherNode.x(), startY: otherNode.y() });
      });
    } else {
      dragStartSnapshot = null;
    }
  });
  node.on("dragmove", () => {
    if (!dragStartSnapshot) return;
    const dx = node.x() - dragStartSnapshot.selfX;
    const dy = node.y() - dragStartSnapshot.selfY;
    dragStartSnapshot.others.forEach(o => { o.node.x(o.startX + dx); o.node.y(o.startY + dy); });
  });
  node.on("dragend", () => {
    item.x = node.x(); item.y = node.y();
    if (dragStartSnapshot) {
      // sync every moved sibling's stored position
      state.selectedInstanceIds.forEach(id => {
        const n = konvaNodesByInstanceId.get(id);
        const it = state.layout.find(x => x.instanceId === id);
        if (n && it) { it.x = n.x(); it.y = n.y(); }
      });
      dragStartSnapshot = null;
    }
    pushHistory(); markDirty();
  });
  node.on("transformend", () => {
    const sx = node.scaleX(), sy = node.scaleY();
    node.scaleX(1); node.scaleY(1);
    item.width = Math.max(20, node.width()*sx);
    item.height = Math.max(20, node.height()*sy);
    item.rotation = node.rotation();
    item.x = node.x(); item.y = node.y();
    node.width(item.width); node.height(item.height);
    syncRotationInput();
    pushHistory(); markDirty();
  });
  konvaNodesByInstanceId.set(item.instanceId, node);
  itemLayer.add(node);
  transformer.moveToTop();
  itemLayer.draw();
}

/* ---------------------------------------------------------------------
   SELECTION — supports multiple items so they can be resized/rotated/
   moved together. Shift-click toggles one item in/out of the selection;
   plain click replaces it; drag-marquee on empty canvas selects everything
   inside the rubber-band box.
--------------------------------------------------------------------- */
function selectNode(node, instanceId, additive){
  if (additive) {
    if (state.selectedInstanceIds.has(instanceId)) state.selectedInstanceIds.delete(instanceId);
    else state.selectedInstanceIds.add(instanceId);
  } else {
    state.selectedInstanceIds = new Set([instanceId]);
  }
  refreshTransformerSelection();
}

function refreshTransformerSelection(){
  const nodes = [...state.selectedInstanceIds]
    .map(id => konvaNodesByInstanceId.get(id))
    .filter(Boolean);
  transformer.nodes(nodes);
  transformer.moveToTop();
  itemLayer.draw();
  syncRotationInput();
}

function clearSelection(){
  state.selectedInstanceIds.clear();
  refreshTransformerSelection();
}

/* Flip / rotate / delete act on every currently selected item ---------- */
function getSelectedList(){
  return [...state.selectedInstanceIds]
    .map(id => ({ node: konvaNodesByInstanceId.get(id), item: state.layout.find(it => it.instanceId === id) }))
    .filter(sel => sel.node && sel.item);
}

function flipSelected(axis){
  const sel = getSelectedList();
  if (!sel.length) { showToast("Select an item first"); return; }
  sel.forEach(({ node, item }) => {
    if (axis === "x") item.flipX = !item.flipX; else item.flipY = !item.flipY;
    node.image(applyFlip(node._sourceImg, item.flipX, item.flipY));
  });
  itemLayer.draw();
  pushHistory(); markDirty();
}

function rotateSelectedBy(deg){
  const sel = getSelectedList();
  if (!sel.length) { showToast("Select an item first"); return; }
  sel.forEach(({ node, item }) => {
    const next = ((node.rotation() + deg) % 360 + 360) % 360;
    node.rotation(next);
    item.rotation = next;
  });
  itemLayer.draw();
  syncRotationInput();
  pushHistory(); markDirty();
}

function setSelectedRotation(deg){
  const sel = getSelectedList();
  if (!sel.length) return;
  const next = ((deg % 360) + 360) % 360;
  sel.forEach(({ node, item }) => { node.rotation(next); item.rotation = next; });
  itemLayer.draw();
  pushHistory(); markDirty();
}

function syncRotationInput(){
  const input = document.getElementById("rotation-input");
  if (!input) return;
  const sel = getSelectedList();
  input.value = sel.length === 1 ? Math.round(sel[0].node.rotation()) : "";
}

async function rebuildCanvasNodes(){
  konvaNodesByInstanceId.forEach(n => n.destroy());
  konvaNodesByInstanceId.clear();
  transformer.nodes([]);
  for (const item of state.layout) {
    await addKonvaNodeForItem(item);
  }
  itemLayer.draw();
}

  e.preventDefault();
  const assetId = Number(e.dataTransfer.getData("application/x-asset-id"));
  if (!assetId) return;
  const asset = await db.assets.get(assetId);
  if (!asset) return;
  const rect = stageContainer.getBoundingClientRect();
  const x = (e.clientX - rect.left) / zoomLevel;
  const y = (e.clientY - rect.top) / zoomLevel;
  addPlacedItem(asset, x - (asset.defaultWidth||160)/2, y - (asset.defaultHeight||160)/2);
});

function svgToDataUrl(svg){
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

async function rasterizeSvg(svg, targetW){
  const img = await loadImageFromSrc(svgToDataUrl(svg));
  const aspect = img.naturalHeight / img.naturalWidth || 1;
  const w = targetW, h = Math.round(targetW * aspect);
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);
  const image = await new Promise(res => canvas.toBlob(res, "image/png"));

  const tW = 160, tH = Math.round(160 * aspect);
  const tCanvas = document.createElement("canvas");
  tCanvas.width = tW; tCanvas.height = tH;
  tCanvas.getContext("2d").drawImage(img, 0, 0, tW, tH);
  const thumbnail = await new Promise(res => tCanvas.toBlob(res, "image/png"));

  return { image, thumbnail };
}

async function seedCatalogIfNeeded(){
  const settingsRow = await db.settings.get("app");
  // Migrate from the old boolean flag: anyone already seeded had v1 items only.
  let appliedVersion = (settingsRow && settingsRow.catalogSeedVersion) || 0;
  if (!appliedVersion && settingsRow && settingsRow.catalogSeeded) appliedVersion = 1;

  const pending = SEED_LIBRARY.filter(def => def.version > appliedVersion);
  if (!pending.length) {
    if (appliedVersion !== (settingsRow && settingsRow.catalogSeedVersion)) {
      await db.settings.put({ ...(settingsRow || { id: "app" }), catalogSeedVersion: appliedVersion });
    }
    return;
  }

  for (const def of pending) {
    const { image, thumbnail } = await rasterizeSvg(def.svg, 320);
    await db.assets.add({
      name: def.name, category: def.category, source: "catalog",
      aiHint: def.aiHint || "",
      image, thumbnail,
      defaultWidth: def.defaultWidth, defaultHeight: def.defaultHeight,
      createdAt: Date.now()
    });
  }
  const maxVersion = Math.max(...SEED_LIBRARY.map(d => d.version));
  await db.settings.put({ ...(settingsRow || { id: "app" }), catalogSeedVersion: maxVersion });
}

let ibSearchTerm = "";

async function renderItemBank(){
  const list = document.getElementById("ib-list");
  const assets = await db.assets.toArray();
  const filtered = ibSearchTerm
    ? assets.filter(a => a.name.toLowerCase().includes(ibSearchTerm.toLowerCase()))
    : assets;

  const groups = {};
  filtered.forEach(a => { (groups[a.category] ??= []).push(a); });

  list.innerHTML = "";
  const catNames = Object.keys(groups);
  if (catNames.length === 0) {
    list.innerHTML = '<p id="ib-empty">No items yet. Upload one below to start your library.</p>';
    return;
  }

  catNames.forEach(cat => {
    const wrap = document.createElement("div");
    wrap.className = "ib-category";
    const toggle = document.createElement("button");

function getImageDimensions(file){
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { resolve({width:img.naturalWidth, height:img.naturalHeight}); URL.revokeObjectURL(url); };
    img.src = url;
  });
}
function makeThumbnail(file, maxSize){
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize/img.naturalWidth, maxSize/img.naturalHeight, 1);
      const w = Math.round(img.naturalWidth*scale), h = Math.round(img.naturalHeight*scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, "image/png");
    };
    img.src = url;
  });
}

async function renderBOM(){

  if (!state.layout.length) {

  }
  const counts = new Map();
  state.layout.forEach(item => counts.set(item.assetId, (counts.get(item.assetId)||0)+1));
  const assetIds = [...counts.keys()];
  const assets = await db.assets.bulkGet(assetIds);
  const rows = assets.map((a,i) => a ? ({name:a.name, category:a.category, qty:counts.get(assetIds[i])}) : null)
    .filter(Boolean)
    .sort((a,b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  if (!rows.length) { el.innerHTML = '<p id="bom-empty">No items placed yet.</p>'; return; }

  let html = '<table><thead><tr><th>Qty</th><th>Item</th><th>Category</th></tr></thead><tbody>';

}

/* ---------------------------------------------------------------------
   AI RENDER (Gemini 2.5 Flash Image / "Nano Banana")
   Sends a flattened snapshot of the current layout as a reference image
   and asks Gemini to re-render it as a photorealistic booth photo while
   preserving item positions, proportions, and counts. This is a
   presentation output — the vector layout stays the source of truth for
   the BOM and exact placement, since generative renders can drift slightly
   run to run.
--------------------------------------------------------------------- */
const GEMINI_MODEL = "gemini-3.1-flash-image"; // default / fallback — actual model used is read from Settings

const AI_RENDER_PROMPT = `This image is a flat 2D schematic mockup of a trade show / AV booth layout,
built from simple placeholder icons on a floor plan or booth photo background.

The single most important constraint: treat the input image's composition as a literal,
fixed template. Every item's position, size, and rotation in your output must match the
input image as closely as pixel-tracing it would — this is not a loose creative reference,
it is the ground truth for where things go. If you are unsure whether to adjust an item's
placement or size "to look better," don't — leave it exactly as drawn, even if it looks
unconventional for that equipment type in real life.

Re-render this as a single photorealistic, professional trade show booth photograph:
- Match each item's position and footprint to the input image as precisely as possible —
  same left/right position, same distance from the floor/back wall, same relative size
  compared to neighboring items and to the background
- Do not add, remove, duplicate, resize, or move any items relative to how they're drawn
- An "ITEM LEGEND" is provided below identifying exactly what each placeholder icon
  represents, roughly where it sits in the frame, and its drawn size. Use these
  identities directly — do NOT guess an item's type from its silhouette alone, since
  several placeholder icons look visually similar (e.g. a touch kiosk's pedestal is
  NOT an art/museum pedestal — render it as an interactive touchscreen kiosk on a
  slim support stand)
- CRITICAL — SIZE: the user has deliberately drawn each item at the exact footprint
  they want it to occupy in the final booth. The size given for each item in the
  legend (as a percentage of the frame) is authoritative. Do NOT default to a
  "standard" or "typical" real-world size for that equipment category — if the user
  drew a display larger or smaller than a standard unit, render it at that drawn
  size, scaled consistently against the other items and the background
- Replace each flat icon with a realistic version of its labeled equipment type, using
  neutral modern materials (matte black, brushed aluminum, dark glass) unless the
  background image implies a different finish
- Add realistic contact shadows, soft ambient occlusion, and reflections appropriate
  to a well-lit indoor trade show hall
- Match the perspective and lighting of the background/floor plan if one is visible
- Professional product photography quality, sharp focus
- CRITICAL — DO NOT add any numbers, circular badges, callouts, legends, labels, price
  tags, or any other text/graphic overlays to the image, and do not add a watermark.
  The output must be a clean photograph with nothing overlaid on it — no exceptions.
  (Any numbered legend the user wants is added separately afterward, not by you.)`;

const REFINE_PROMPT_BASE = `This is an existing photorealistic trade show booth render. Apply this specific change and nothing else:\n\n`;

/** Builds a per-item "what is this, where, and how big" legend so Gemini doesn't
 *  have to guess an item's identity or scale from icon shape alone (source of
 *  prior misreads, e.g. a kiosk pedestal read as an art pedestal). */
async function buildItemLegend(){
  const rows = await Promise.all(state.layout.map(async (item, i) => {
    const asset = await db.assets.get(item.assetId);
    if (!asset) return null;
    const cx = Math.round(((item.x + item.width / 2) / STAGE_W) * 100);
    const cy = Math.round(((item.y + item.height / 2) / STAGE_H) * 100);
    const wPct = Math.round((item.width / STAGE_W) * 100);
    const hPct = Math.round((item.height / STAGE_H) * 100);
    const hint = asset.aiHint ? ` — ${asset.aiHint}` : "";
    return `${i + 1}. "${asset.name}" (${asset.category})${hint}\n   Position: ~${cx}% from left, ~${cy}% from top. Size: ~${wPct}% of frame width × ${hPct}% of frame height. Rotation: ${Math.round(item.rotation)}°.`;
  }));
  return rows.filter(Boolean).join("\n");
}

/** Plain "1. Name" list, same numbering/order as buildItemLegend(), used as the
 *  editable text for the numbered BOM legend overlay — separate from the full
 *  grounding legend since the user may want different/more specific wording
 *  here without touching the actual item names or the AI's identification cues. */
async function buildBomLegendPlainText(){
  const rows = await Promise.all(state.layout.map(async (item, i) => {
    const asset = await db.assets.get(item.assetId);
    return asset ? `${i + 1}. ${asset.name}` : null;
  }));
  return rows.filter(Boolean).join("\n");
}

/**
 * Sends a reference image + prompt to Gemini and returns a raw base64 PNG data URL.
 * Shared by the main "Render with AI" flow (schematic layout -> photoreal) and the
 * "Refine" flow (existing render -> further-edited render). Throws on failure;
 * callers handle the 429/other-error UX.
 */
async function callGeminiRender(imageBase64, promptText){
  const settingsRow = await db.settings.get("app");
  const apiKey = settingsRow && settingsRow.geminiApiKey;
  const model = (settingsRow && settingsRow.geminiModel) || GEMINI_MODEL;
  if (!apiKey) {
    const err = new Error("NO_API_KEY");
    err.code = "NO_API_KEY";
    throw err;
  }
  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: promptText },
          { inline_data: { mime_type: "image/png", data: imageBase64 } }
        ]
      }],
      generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
    })
  });

  if (res.status === 429) {
    const err = new Error("QUOTA");
    err.code = "QUOTA";
    throw err;
  }
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Gemini API error (${res.status}): ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  const imagePart = parts.find(p => p.inlineData || p.inline_data);
  const inline = imagePart && (imagePart.inlineData || imagePart.inline_data);
  if (!inline) {
    const textPart = parts.find(p => p.text);
    throw new Error(textPart ? `No image returned: ${textPart.text.slice(0,200)}` : "No image returned by Gemini");
  }
  const mime = inline.mimeType || inline.mime_type || "image/png";
  return `data:${mime};base64,${inline.data}`;
}

function handleRenderError(err){
  console.error(err);
  if (err.code === "NO_API_KEY") {
    showToast("Add a Gemini API key in Settings first");
    openSettingsModal();
  } else if (err.code === "QUOTA") {
    showToast("Quota/billing limit hit on this model — open Settings to try a different one, or enable billing at aistudio.google.com");
  } else {
    showToast("AI render failed — " + err.message);
  }
}

/* ---------------------------------------------------------------------
   RENDERS LIBRARY — save finished AI renders locally, browse them later,
   and feed a saved render back into Gemini with new instructions ("refine")
   instead of starting over from the flat layout each time.

   Each saved record keeps both the finished `image` (what you see/download)
   and the clean `rawImage` the AI actually produced, before our own
   header/footer/BOM-legend overlay was drawn on top. Refining always uses
   the raw version — feeding an already-decorated image back into Gemini and
   then decorating it again is what caused headers/footers to stack up.
--------------------------------------------------------------------- */
function dataUrlToBlob(dataUrl){
  return fetch(dataUrl).then(r => r.blob());
}

async function makeRenderThumbnail(blob, maxW = 320){
  const img = await loadHtmlImage(blob);
  const scale = Math.min(maxW / img.naturalWidth, 1);
  const w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);
  return new Promise(res => canvas.toBlob(res, "image/jpeg", 0.85));
}

async function renderRendersLibraryGrid(container, closeParent){

  }
  container.innerHTML = "";
  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:14px;";
  all.forEach(rec => {
    const card = document.createElement("div");
    card.style.cssText = "background:var(--input-bg);border:1px solid var(--glass-border);border-radius:12px;overflow:hidden;";
    const img = document.createElement("img");

    img.style.cssText = "width:100%;height:120px;object-fit:cover;display:block;cursor:pointer;";
    img.addEventListener("click", () => openRenderViewer(rec));
    const body = document.createElement("div");
    body.style.cssText = "padding:10px;";
    body.innerHTML = `
      <div style="font-size:12.5px;font-weight:600;margin-bottom:2px;" data-name-label>${escapeHtml(rec.name)}</div>

        <button class="btn" data-act="edit" style="font-size:11px;padding:5px 9px;">Edit</button>
        <button class="btn" data-act="download" style="font-size:11px;padding:5px 9px;">Download</button>
        <button class="btn" data-act="delete" style="font-size:11px;padding:5px 9px;color:#e08a8a;">Delete</button>
      </div>`;
    body.querySelector('[data-act="view"]').addEventListener("click", () => openRenderViewer(rec));

async function compositeWithHeaderFooter(layoutImg, meta, size){
  const HEADER_H = meta.showMetadata ? 130 : 0;
  const FOOTER_H = (meta.showMetadata && meta.notes) ? 90 : 0;
  const PAD = 40;

  const legendLines = meta.includeBomOverlay ? await getBomLegendLinesForOverlay() : [];
  const LEGEND_H = legendLines.length ? measureBomLegendHeight(size.width, legendLines) : 0;

  const canvas = document.createElement("canvas");
  canvas.width = size.width;
  canvas.height = size.height + HEADER_H + FOOTER_H + LEGEND_H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (HEADER_H) {
    ctx.fillStyle = "#0B0F14";
    ctx.fillRect(0,0,canvas.width,HEADER_H);
    ctx.fillStyle = "#E8C97A";
    ctx.font = "bold 40px 'Playfair Display', serif";
    ctx.fillText(meta.companyName || "AIM AV", PAD, HEADER_H/2 - 6);
    ctx.fillStyle = "#CBD5D9";
    ctx.font = "22px 'DM Sans', sans-serif";
    ctx.fillText(`Client: ${meta.clientName || "—"}    ${new Date().toLocaleDateString()}`, PAD, HEADER_H/2 + 34);
  }

  ctx.drawImage(layoutImg, 0, HEADER_H, size.width, size.height);

  if (legendLines.length) {
    drawBomLegendBadges(ctx, size.width, size.height, HEADER_H);
    drawBomLegendBand(ctx, size.width, HEADER_H + size.height, legendLines);
  }

  if (FOOTER_H) {
    const footerY = HEADER_H + size.height + LEGEND_H;
    ctx.fillStyle = "#0B0F14";
    ctx.fillRect(0, footerY, canvas.width, FOOTER_H);
    ctx.fillStyle = "#CBD5D9";
    ctx.font = "18px 'DM Sans', sans-serif";
    wrapText(ctx, meta.notes, PAD, footerY+30, canvas.width-PAD*2, 24);
  }

  if (meta.showWatermark) {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#000000";
    ctx.font = "bold 90px 'DM Sans', sans-serif";
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(-Math.PI/8);
    ctx.textAlign = "center";
    ctx.fillText(meta.companyName || "AIM AV DRAFT", 0, 0);
    ctx.restore();
  }
  return canvas.toDataURL("image/png");
}

/**
 * BOM legend numbers/badges are drawn by us directly from state.layout's actual
 * coordinates — not by asking the AI to guess and hand-letter them onto the image.
 * Generative models are unreliable at rendering small legible text/numbers
 * (a known limitation across all current image models, not specific to Gemini),
 * so numbering this way is the only way to guarantee every item gets exactly
 * one correct, correctly-numbered badge.
 */
async function getBomLegendLinesForOverlay(){
  const custom = (state.meta.bomLegendText || "").trim();
  if (custom) return custom.split("\n").map(l => l.trim()).filter(Boolean);
  const plain = await buildBomLegendPlainText(); // "1. Name\n2. Name..." — same order as state.layout
  return plain.split("\n").filter(Boolean);
}

function drawBomLegendBadges(ctx, photoW, photoH, yOffset){
  const badgeR = Math.max(13, Math.round(photoW * 0.014));
  state.layout.forEach((item, i) => {
    const cx = (item.x / STAGE_W) * photoW;
    const cy = yOffset + (item.y / STAGE_H) * photoH;
    ctx.beginPath();
    ctx.arc(cx, cy, badgeR, 0, Math.PI * 2);
    ctx.fillStyle = "#E8C97A";
    ctx.fill();
    ctx.lineWidth = Math.max(1.5, badgeR * 0.14);
    ctx.strokeStyle = "#1a1508";
    ctx.stroke();
    ctx.fillStyle = "#1a1508";
    ctx.font = `bold ${Math.round(badgeR * 1.15)}px 'DM Sans', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(i + 1), cx, cy + badgeR * 0.05);
  });
}

function legendLayoutMetrics(canvasW, legendLines){
  const pad = 40, colWidth = 260, lineH = 24, titleH = 34;
  const cols = Math.max(1, Math.min(4, Math.floor((canvasW - pad*2) / colWidth)));
  const perCol = Math.ceil(legendLines.length / cols);
  return { pad, colWidth, lineH, titleH, cols, perCol };
}
function measureBomLegendHeight(canvasW, legendLines){
  const { lineH, titleH, perCol } = legendLayoutMetrics(canvasW, legendLines);
  return titleH + perCol * lineH + 30;
}
function drawBomLegendBand(ctx, canvasW, yStart, legendLines){
  const { pad, colWidth, lineH, titleH, perCol } = legendLayoutMetrics(canvasW, legendLines);
  const bandH = measureBomLegendHeight(canvasW, legendLines);
  ctx.fillStyle = "#0B0F14";
  ctx.fillRect(0, yStart, canvasW, bandH);
  ctx.fillStyle = "#E8C97A";
  ctx.font = "bold 19px 'Playfair Display', serif";
  ctx.fillText("EQUIPMENT LEGEND", pad, yStart + 25);
  ctx.font = "14px 'DM Sans', sans-serif";
  ctx.fillStyle = "#CBD5D9";
  legendLines.forEach((line, i) => {
    const col = Math.floor(i / perCol);
    const row = i % perCol;
    ctx.fillText(line, pad + col * colWidth, yStart + titleH + 16 + row * lineH);
  });
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = (text||"").split(" ");
  let line = "", curY = y;
  words.forEach(word => {
    const test = line + word + " ";
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, curY); line = word + " "; curY += lineHeight;
    } else line = test;
  });
  ctx.fillText(line, x, curY);
}

const BLOB_FIELDS = { assets: ["thumbnail","image"], projects: ["baseImage"], renders: ["image","rawImage","thumbnail"] };

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function base64ToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return res.blob();
}

function dedupeKeyFor(tableName, row){
  if (tableName === "assets") return `${row.name}::${row.category}`;
  if (tableName === "renders") return `${row.name}::${row.createdAt}`;
  return null; // projects/settings aren't merged row-by-row — see runRestore
}

async function runRestore(dump, mode){
  const MERGEABLE_TABLES = ["assets", "renders"];

  // Decode every blob field BEFORE opening the transaction. base64ToBlob() uses
  // fetch(), and awaiting fetch() partway through a Dexie transaction silently
  // invalidates it (a known Dexie/IndexedDB gotcha) — that's what was causing
  // some tables (renders, sometimes others) to drop out of restores with no error.
  const decodedTables = {};
  for (const table of db.tables) {
    const rows = dump.tables[table.name] || [];
    const blobFields = BLOB_FIELDS[table.name] || [];
    decodedTables[table.name] = await Promise.all(rows.map(async row => {
      const copy = { ...row };
      for (const field of blobFields) {
        if (copy["__" + field + "IsBlob"]) {
          copy[field] = await base64ToBlob(copy[field]);
          delete copy["__" + field + "IsBlob"];
        }
      }
      return copy;
    }));
  }

  let addedCount = 0, skippedCount = 0;
  try {
    await db.transaction("rw", db.tables, async () => {
      for (const table of db.tables) {
        const decoded = decodedTables[table.name] || [];

        if (mode === "overwrite") {
          await table.clear();
          if (decoded.length) await table.bulkPut(decoded);
          continue;
        }

        // merge mode
        if (!MERGEABLE_TABLES.includes(table.name)) continue; // leave projects/settings alone
        const existing = await table.toArray();
        const existingKeys = new Set(existing.map(r => dedupeKeyFor(table.name, r)));
        const toAdd = decoded.filter(r => !existingKeys.has(dedupeKeyFor(table.name, r)));
        toAdd.forEach(r => delete r.id); // let Dexie assign fresh ids to avoid collisions
        skippedCount += decoded.length - toAdd.length;
        addedCount += toAdd.length;
        if (toAdd.length) await table.bulkAdd(toAdd);
      }
    });
  } catch (err) {
    console.error("Restore failed:", err);
    showToast("Restore failed — " + err.message);
    return;
  }

  if (mode === "overwrite") {
    showToast("Restore complete — reloading…");
    setTimeout(() => location.reload(), 800);
  } else {
    showToast(`Merge complete — added ${addedCount}, skipped ${skippedCount} duplicate${skippedCount === 1 ? "" : "s"}`);
    await renderItemBank();
  }
}

/* ---------------------------------------------------------------------
   UNDO / REDO buttons + keyboard shortcuts
--------------------------------------------------------------------- */
document.getElementById("undo-btn").addEventListener("click", undo);
document.getElementById("redo-btn").addEventListener("click", redo);
document.getElementById("flip-h-btn").addEventListener("click", () => flipSelected("x"));
document.getElementById("flip-v-btn").addEventListener("click", () => flipSelected("y"));
document.getElementById("rotate-ccw-btn").addEventListener("click", () => rotateSelectedBy(-90));
document.getElementById("rotate-cw-btn").addEventListener("click", () => rotateSelectedBy(90));
document.getElementById("rotation-input").addEventListener("change", (e) => {
  const val = parseFloat(e.target.value);
  if (!isNaN(val)) setSelectedRotation(val);
});

window.addEventListener("keydown", (e) => {
  const typing = document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA";
  if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redo(); }
  if (typing) return;
  if (e.key === "Delete" || e.key === "Backspace") { if (state.selectedInstanceIds.size) deleteSelected(); }
  if (e.key === "[") rotateSelectedBy(-15);   // fine rotation, counterclockwise
  if (e.key === "]") rotateSelectedBy(15);    // fine rotation, clockwise
  if (e.key.toLowerCase() === "h") flipSelected("x");
  if (e.key.toLowerCase() === "v") flipSelected("y");
});
function deleteSelected(){
  const ids = [...state.selectedInstanceIds];
  if (!ids.length) return;
  state.layout = state.layout.filter(it => !ids.includes(it.instanceId));
  ids.forEach(id => {
    const node = konvaNodesByInstanceId.get(id);
    if (node) node.destroy();
    konvaNodesByInstanceId.delete(id);
  });
  transformer.nodes([]);
  state.selectedInstanceIds.clear();
  itemLayer.draw();
  syncRotationInput();
  pushHistory();
  renderBOM();
  markDirty();
}

/* ---------------------------------------------------------------------
   MISC HELPERS
--------------------------------------------------------------------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/** App-themed confirmation dialog (glass modal, matches the rest of the UI)
 *  — used instead of the browser's native confirm() anywhere a destructive
 *  or hard-to-undo action needs a check first. Resolves true/false. */
function confirmDialog(title, message, confirmLabel = "Confirm", danger = false){
  return new Promise((resolve) => {
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal" style="width:420px;">
        <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="modal-close">✕</button></div>
        <div class="modal-body"><p style="font-size:13.5px;line-height:1.6;color:var(--text-dim);">${escapeHtml(message)}</p></div>
        <div class="modal-foot">
          <button class="btn" id="cd-cancel">Cancel</button>
          <button class="btn ${danger ? "" : "primary"}" id="cd-confirm"
            style="${danger ? "background:#c0524f;color:#fff;border-color:#c0524f;" : ""}">${escapeHtml(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const finish = (result) => { overlay.remove(); resolve(result); };
    overlay.querySelector(".modal-close").addEventListener("click", () => finish(false));
    overlay.querySelector("#cd-cancel").addEventListener("click", () => finish(false));
    overlay.addEventListener("click", (e) => { if (e.target === overlay) finish(false); });
    overlay.querySelector("#cd-confirm").addEventListener("click", () => finish(true));
  });
}

let toastTimer = null;
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 5000);
}
