<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIM AV — Booth Designer</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/konva@9.3.14/konva.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{
    --radius-lg:18px; --radius-md:12px; --radius-sm:8px;
  }
  /* Dark theme (default) */
  :root, :root[data-theme="dark"]{
    --gold:#E8C97A; --teal:#4FD1C5;
    --bg-a:#0B0F14; --bg-b:#151b24;
    --text:#E4E9ED; --text-dim:rgba(228,233,237,.55);
    --glass-bg:rgba(24,30,38,.55); --glass-bg-strong:rgba(20,25,32,.72);
    --glass-border:rgba(255,255,255,.10); --glass-highlight:rgba(255,255,255,.07);
    --shadow:0 8px 32px rgba(0,0,0,.45); --shadow-sm:0 2px 10px rgba(0,0,0,.3);
    --input-bg:rgba(255,255,255,.06); --hover-bg:rgba(255,255,255,.08);
    --canvas-bg:#1a1f26;
    --icon-filter:none;
  }
  /* Light theme — deeper accent colors (the bright dark-mode gold/teal wash out
     on light backgrounds), and a dimmer, warmer base so glass panels read as
     distinct surfaces instead of blending into stark white. */
  :root[data-theme="light"]{
    --gold:#96650E; --teal:#0A7A6E;
    --bg-a:#D6DBE2; --bg-b:#C5CCD6;
    --text:#141922; --text-dim:rgba(20,25,34,.62);
    --glass-bg:rgba(255,255,255,.58); --glass-bg-strong:rgba(255,255,255,.82);
    --glass-border:rgba(15,20,30,.16); --glass-highlight:rgba(255,255,255,.9);
    --shadow:0 8px 32px rgba(15,20,30,.18); --shadow-sm:0 2px 10px rgba(15,20,30,.12);
    --input-bg:rgba(15,20,30,.06); --hover-bg:rgba(15,20,30,.09);
    --canvas-bg:#e9ecef;
    --icon-filter:brightness(.6) saturate(1.3);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;color:var(--text);font-family:'DM Sans',sans-serif;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(232,201,122,.12), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(79,209,197,.10), transparent 45%),
      linear-gradient(160deg, var(--bg-a), var(--bg-b));
    background-attachment:fixed;
    transition:background-color .2s ease, color .2s ease;
  }
  h1,h2,h3{font-family:'Playfair Display',serif;color:var(--gold);margin:0;}
  button{font-family:inherit;cursor:pointer;}
  #app{height:100vh;display:flex;flex-direction:column;}

  /* Glass surface — shared treatment for topbar, sidebars, modals, cards */
  .glass{
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(22px) saturate(180%);
    backdrop-filter:blur(22px) saturate(180%);
    border:1px solid var(--glass-border);
    box-shadow:var(--shadow), inset 0 1px 0 var(--glass-highlight);
  }

  /* Topbar */
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px;flex-wrap:wrap;
    margin:12px 12px 0 12px;border-radius:var(--radius-lg);position:relative;z-index:5;}
  #topbar h1{font-size:19px;}
  .btn{background:var(--input-bg);border:1px solid var(--glass-border);color:var(--text);border-radius:999px;padding:7px 14px;font-size:12.5px;transition:.15s;}
  .btn:hover{background:var(--hover-bg);transform:translateY(-1px);}
  .btn.primary{background:var(--gold);color:#1a1508;border-color:var(--gold);font-weight:600;box-shadow:0 4px 14px rgba(232,201,122,.35);}
  .btn.primary:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  #autosave-status{font-size:11px;color:var(--text-dim);min-width:90px;text-align:right;}
  #theme-toggle{display:flex;align-items:center;gap:2px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:999px;padding:3px;}
  #theme-toggle button{background:none;border:none;border-radius:999px;padding:5px 9px;font-size:13px;color:var(--text-dim);line-height:1;transition:.15s;}
  #theme-toggle button.active{background:var(--gold);color:#1a1508;}

  /* Main layout */
  #main{flex:1;display:flex;overflow:hidden;gap:12px;padding:12px;min-height:0;}

  /* Item Bank */
  #itembank{width:270px;flex-shrink:0;display:flex;flex-direction:column;border-radius:var(--radius-lg);overflow:hidden;}
  #itembank .ib-head{padding:14px;border-bottom:1px solid var(--glass-border);}
  #itembank h2{font-size:16px;letter-spacing:.02em;}
  #ib-search{width:100%;margin-top:8px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;}
  #ib-search::placeholder{color:var(--text-dim);}
  #ib-list{flex:1;overflow-y:auto;padding:10px 8px;}
  .ib-category{margin-bottom:4px;}
  .ib-cat-toggle{width:100%;background:none;border:none;color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:8px 6px;display:flex;justify-content:space-between;align-items:center;}
  .ib-cat-toggle:hover{color:var(--text);}
  .ib-cat-items{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 4px 12px;}
  .ib-card{background:var(--input-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:8px;text-align:center;cursor:grab;transition:.15s;}
  .ib-card:hover{border-color:rgba(232,201,122,.6);background:var(--hover-bg);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
  .ib-card img{height:60px;width:100%;object-fit:contain;pointer-events:none;filter:var(--icon-filter);}
  .ib-card span{display:block;font-size:10.5px;line-height:1.25;margin-top:4px;color:var(--text-dim);}
  #ib-empty{font-size:12px;color:var(--text-dim);text-align:center;padding:30px 10px;}
  #ib-upload-wrap{padding:12px;border-top:1px solid var(--glass-border);}
  #ib-category-select{width:100%;margin-bottom:8px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:6px 8px;color:var(--text);font-size:12px;}
  #ib-upload-btn{width:100%;border:1px solid rgba(232,201,122,.4);color:var(--gold);border-radius:999px;padding:9px;font-size:12px;font-weight:600;background:rgba(232,201,122,.08);}
  #ib-upload-btn:hover{background:rgba(232,201,122,.16);}

  /* Canvas */
  #canvas-area{flex:1;overflow:auto;padding:8px;display:flex;align-items:flex-start;justify-content:center;min-width:0;}
  #stage-container{background:var(--canvas-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);overflow:hidden;position:relative;box-shadow:var(--shadow);}
  #canvas-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px;pointer-events:none;}

  /* BOM panel */
  #bom{width:270px;flex-shrink:0;border-radius:var(--radius-lg);padding:16px;overflow-y:auto;}
  #bom h3{font-size:14px;margin-bottom:10px;}
  #bom table{width:100%;border-collapse:collapse;font-size:12.5px;}
  #bom th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);border-bottom:1px solid var(--glass-border);padding-bottom:6px;font-weight:500;}
  #bom td{padding:6px 0;border-bottom:1px solid var(--glass-border);}
  #bom-empty{font-size:12px;color:var(--text-dim);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(10,12,16,.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{width:420px;background:var(--glass-bg-strong);-webkit-backdrop-filter:blur(28px) saturate(180%);backdrop-filter:blur(28px) saturate(180%);
    border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:0 24px 70px rgba(0,0,0,.4), inset 0 1px 0 var(--glass-highlight);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--glass-border);}
  .modal-head h3{font-size:17px;}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:16px;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:5px;}
  .field input[type=text],.field textarea,.field select{width:100%;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;}
  .toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;padding-top:8px;border-top:1px solid var(--glass-border);}
  .toggle-row input{accent-color:var(--gold);}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--glass-border);}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--glass-bg-strong);-webkit-backdrop-filter:blur(20px) saturate(180%);backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--glass-border);border-radius:999px;padding:10px 18px;font-size:12.5px;color:var(--text);opacity:0;transition:opacity .25s;pointer-events:none;z-index:100;box-shadow:var(--shadow);}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<script>
  // Applied before first paint to avoid a flash of the wrong theme.
  (function(){
    var saved = localStorage.getItem("aimav-theme"); // "light" | "dark" | null (= system)
    var effective = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", effective);
  })();
</script>
<div id="app">

  <div id="topbar" class="glass">
    <h1>AIM AV — Booth Designer</h1>
    <div class="btn-row">
      <label class="btn">Load Floor Plan<input type="file" id="base-image-input" accept="image/*" hidden></label>
      <button class="btn" id="undo-btn" disabled>Undo</button>

      <span style="width:1px;height:20px;background:var(--glass-border);"></span>
      <button class="btn" id="flip-h-btn" title="Flip selected item horizontally">Flip ↔</button>

      <span style="width:1px;height:20px;background:var(--glass-border);"></span>

      <button class="btn" id="backup-btn">Backup</button>
      <label class="btn">Restore<input type="file" id="restore-input" accept="application/json" hidden></label>

      <div id="theme-toggle" title="Theme">

  <div id="main">
    <aside id="itembank" class="glass">
      <div class="ib-head">
        <h2>Item Bank</h2>
        <input id="ib-search" type="text" placeholder="Search items…">
      </div>
      <div id="ib-list"></div>
      <div id="ib-upload-wrap">
        <select id="ib-category-select">
          <option>Display Systems</option>
          <option>Kiosks</option>
          <option>Projection</option>
          <option>Audio</option>
          <option>Computers</option>
          <option>Networking</option>
          <option>Mobile Devices</option>
          <option>Furniture</option>
          <option>Staging</option>
          <option>Truss</option>
          <option>Lighting</option>
          <option>Accessories</option>
          <option>Custom</option>
        </select>
        <button id="ib-upload-btn">+ Upload PNG to Library</button>
        <input type="file" id="ib-file-input" accept="image/png" multiple hidden>
      </div>
    </aside>

    <div id="canvas-area">
      <div id="stage-container">
        <div id="canvas-hint">Drag items from the bank onto the canvas</div>
      </div>
    </div>

    <aside id="bom" class="glass">
      <h3>Bill of Materials</h3>
      <div id="bom-content"><p id="bom-empty">No items placed yet.</p></div>
    </aside>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
"use strict";

/* ---------------------------------------------------------------------
   THEME — defaults to system preference; user choice persists locally
   and overrides system until they pick "system" again.
--------------------------------------------------------------------- */
function applyTheme(choice){
  const effective = choice === "system"
    ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : choice;
  document.documentElement.setAttribute("data-theme", effective);
  document.querySelectorAll("#theme-toggle button").forEach(b =>
    b.classList.toggle("active", b.dataset.themeChoice === choice));
}
function currentThemeChoice(){
  return localStorage.getItem("aimav-theme") || "system";
}
document.querySelectorAll("#theme-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    const choice = btn.dataset.themeChoice;
    if (choice === "system") localStorage.removeItem("aimav-theme");
    else localStorage.setItem("aimav-theme", choice);
    applyTheme(choice);
  });
});
applyTheme(currentThemeChoice());
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  if (currentThemeChoice() === "system") applyTheme("system");
});

/* ---------------------------------------------------------------------
   CDN LOAD GUARD — fail loud instead of silently leaving the UI blank
--------------------------------------------------------------------- */
const missing = [];
if (typeof Dexie === "undefined") missing.push("Dexie");
if (typeof Konva === "undefined") missing.push("Konva");
if (typeof html2canvas === "undefined") missing.push("html2canvas");
if (missing.length) {
  document.body.innerHTML =
    '<div style="padding:40px;font-family:sans-serif;color:#CBD5D9;background:#0B0F14;height:100vh;">' +
    '<h2 style="color:#E8C97A;">Couldn\u2019t load required libraries</h2>' +
    '<p>' + missing.join(", ") + ' failed to load from the CDN. Check your internet connection and refresh. ' +
    'If this keeps happening, the CDN may be blocked on this network.</p></div>';
  throw new Error("Missing dependencies: " + missing.join(", "));
}

/* ---------------------------------------------------------------------
   DATABASE
--------------------------------------------------------------------- */
const db = new Dexie("AimAvDB");
db.version(1).stores({
  assets: "++id, name, category, source, createdAt",
  projects: "++id, name, updatedAt",
  settings: "id"
});
db.on("populate", () => {
  db.settings.put({ id: "app", defaultCompanyName: "", lastProjectId: 1 });
});

const PROJECT_ID = 1; // single always-on project for the local-first MVP
const STAGE_W = 1400, STAGE_H = 900;
const HISTORY_LIMIT = 50;

/* ---------------------------------------------------------------------
   STATE
--------------------------------------------------------------------- */
const state = {
  baseImageBlob: null,
  layout: [],                 // [{instanceId, assetId, x, y, width, height, rotation, zIndex}]
  meta: { companyName:"", clientName:"", notes:"", showMetadata:true, showWatermark:false, aiNotes:"" },
  history: [], historyIndex: -1,
  dirty: false,
  selectedInstanceId: null,
};

let saveTimer = null;
function markDirty(){
  state.dirty = true;
  setStatus("Unsaved changes…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveProject, 500); // debounced autosave
}

function pushHistory(){
  const snapshot = JSON.parse(JSON.stringify(state.layout));
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.history.push(snapshot);
  if (state.history.length > HISTORY_LIMIT) state.history.shift();
  state.historyIndex = state.history.length - 1;
  updateUndoRedoButtons();
}

function undo(){
  if (state.historyIndex <= 0) return;
  state.historyIndex--;
  restoreLayoutSnapshot(state.history[state.historyIndex]);
}
function redo(){
  if (state.historyIndex >= state.history.length - 1) return;
  state.historyIndex++;
  restoreLayoutSnapshot(state.history[state.historyIndex]);
}
function restoreLayoutSnapshot(snapshot){
  state.layout = JSON.parse(JSON.stringify(snapshot));
  rebuildCanvasNodes();
  renderBOM();
  updateUndoRedoButtons();
  markDirty();
}
function updateUndoRedoButtons(){
  document.getElementById("undo-btn").disabled = state.historyIndex <= 0;
  document.getElementById("redo-btn").disabled = state.historyIndex >= state.history.length - 1;
}

/* ---------------------------------------------------------------------
   PERSISTENCE (autosave / load)
--------------------------------------------------------------------- */
async function saveProject(){
  await db.projects.put({
    id: PROJECT_ID,
    name: "Active Project",
    baseImage: state.baseImageBlob || null,
    layout: state.layout,
    meta: state.meta,
    updatedAt: Date.now()
  });
  state.dirty = false;
  setStatus("Saved " + new Date().toLocaleTimeString());
}

async function loadProject(){
  const proj = await db.projects.get(PROJECT_ID);
  if (!proj) { setStatus("Ready"); return; }
  state.baseImageBlob = proj.baseImage || null;
  state.layout = proj.layout || [];
  state.meta = proj.meta || state.meta;
  if (state.baseImageBlob) await setBaseImage(state.baseImageBlob, false);
  await rebuildCanvasNodes();
  pushHistory();
  renderBOM();
  setStatus("Loaded");
}

function setStatus(text){
  document.getElementById("autosave-status").textContent = text;
}

/* ---------------------------------------------------------------------
   UNSAVED CHANGES GUARD
--------------------------------------------------------------------- */
window.addEventListener("beforeunload", (e) => {
  if (!state.dirty) return;
  e.preventDefault();
  e.returnValue = "";
});

/* ---------------------------------------------------------------------
   KONVA STAGE
--------------------------------------------------------------------- */
const stageContainer = document.getElementById("stage-container");
stageContainer.style.width = STAGE_W + "px";
stageContainer.style.height = STAGE_H + "px";

const stage = new Konva.Stage({ container: "stage-container", width: STAGE_W, height: STAGE_H });
const baseLayer = new Konva.Layer();
const itemLayer = new Konva.Layer();
stage.add(baseLayer);
stage.add(itemLayer);

const transformer = new Konva.Transformer({ rotateEnabled:true, keepRatio:false,
  boundBoxFunc:(oldBox,newBox)=> (newBox.width<20||newBox.height<20) ? oldBox : newBox });
itemLayer.add(transformer);

let baseImageNode = null;
const konvaNodesByInstanceId = new Map();

stage.on("mousedown touchstart", (e) => {
  if (e.target === stage) {
    transformer.nodes([]);
    state.selectedInstanceId = null;
    itemLayer.draw();
    syncRotationInput();
  }
});

async function setBaseImage(blob, autosave = true){
  state.baseImageBlob = blob;
  const img = await loadHtmlImage(blob);
  if (baseImageNode) baseImageNode.destroy();
  baseImageNode = new Konva.Image({ image: img, x:0, y:0, width: STAGE_W, height: STAGE_H, listening:false });
  baseLayer.destroyChildren();
  baseLayer.add(baseImageNode);
  baseLayer.draw();
  document.getElementById("canvas-hint").style.display = "none";
  if (autosave) markDirty();
}

function loadHtmlImage(blob){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

async function addPlacedItem(asset, x, y){
  const instanceId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()));
  const item = {
    instanceId, assetId: asset.id,
    x, y,
    width: asset.defaultWidth || 160, height: asset.defaultHeight || 160,
    rotation: 0, flipX: false, flipY: false, zIndex: state.layout.length
  };
  state.layout.push(item);
  await addKonvaNodeForItem(item, asset.image);
  pushHistory();
  renderBOM();
  markDirty();
}

// Mirroring is done by pre-drawing a flipped copy of the source image onto a
// canvas, rather than using Konva's scaleX/scaleY(-1). Keeping flip separate
// from the Transformer's own scale-based resize math avoids the handle and
// bounding-box glitches that negative scale values tend to cause.
function applyFlip(img, flipX, flipY){
  if (!flipX && !flipY) return img;
  const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.translate(flipX ? w : 0, flipY ? h : 0);
  ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  ctx.drawImage(img, 0, 0);
  return canvas;
}

async function addKonvaNodeForItem(item, imageBlob){
  let blob = imageBlob;
  if (!blob) {
    const asset = await db.assets.get(item.assetId);
    if (!asset) return;
    blob = asset.image;
  }
  const img = await loadHtmlImage(blob);
  const node = new Konva.Image({
    image: applyFlip(img, item.flipX, item.flipY),
    x:item.x, y:item.y, width:item.width, height:item.height,
    rotation:item.rotation, draggable:true
  });
  node._sourceImg = img; // keep the unflipped original so we can re-flip on toggle
  node.on("click tap", () => selectNode(node, item.instanceId));
  node.on("dragend", () => {
    item.x = node.x(); item.y = node.y();
    pushHistory(); markDirty();
  });
  node.on("transformend", () => {
    const sx = node.scaleX(), sy = node.scaleY();
    node.scaleX(1); node.scaleY(1);
    item.width = Math.max(20, node.width()*sx);
    item.height = Math.max(20, node.height()*sy);
    item.rotation = node.rotation();
    node.width(item.width); node.height(item.height);
    syncRotationInput();
    pushHistory(); markDirty();
  });
  konvaNodesByInstanceId.set(item.instanceId, node);
  itemLayer.add(node);
  transformer.moveToTop();
  itemLayer.draw();
}

function selectNode(node, instanceId){
  state.selectedInstanceId = instanceId;
  transformer.nodes([node]);
  transformer.moveToTop();
  itemLayer.draw();
  syncRotationInput();
}

/* Flip / rotate actions on the current selection ----------------------- */
function getSelected(){
  const id = state.selectedInstanceId;
  if (!id) return null;
  const node = konvaNodesByInstanceId.get(id);
  const item = state.layout.find(it => it.instanceId === id);
  return node && item ? { node, item } : null;
}

function flipSelected(axis){
  const sel = getSelected();
  if (!sel) { showToast("Select an item first"); return; }
  const { node, item } = sel;
  if (axis === "x") item.flipX = !item.flipX; else item.flipY = !item.flipY;
  node.image(applyFlip(node._sourceImg, item.flipX, item.flipY));
  itemLayer.draw();
  pushHistory(); markDirty();
}

function rotateSelectedBy(deg){
  const sel = getSelected();
  if (!sel) { showToast("Select an item first"); return; }
  const { node, item } = sel;
  const next = ((node.rotation() + deg) % 360 + 360) % 360;
  node.rotation(next);
  item.rotation = next;
  itemLayer.draw();
  syncRotationInput();
  pushHistory(); markDirty();
}

function setSelectedRotation(deg){
  const sel = getSelected();
  if (!sel) return;
  const { node, item } = sel;
  const next = ((deg % 360) + 360) % 360;
  node.rotation(next);
  item.rotation = next;
  itemLayer.draw();
  pushHistory(); markDirty();
}

function syncRotationInput(){
  const input = document.getElementById("rotation-input");
  if (!input) return;
  const sel = getSelected();
  input.value = sel ? Math.round(sel.node.rotation()) : "";
}

async function rebuildCanvasNodes(){
  konvaNodesByInstanceId.forEach(n => n.destroy());
  konvaNodesByInstanceId.clear();
  transformer.nodes([]);
  for (const item of state.layout) {
    await addKonvaNodeForItem(item);
  }
  itemLayer.draw();
}

// Drag from Item Bank onto the stage container
stageContainer.addEventListener("dragover", (e) => e.preventDefault());
stageContainer.addEventListener("drop", async (e) => {
  e.preventDefault();
  const assetId = Number(e.dataTransfer.getData("application/x-asset-id"));
  if (!assetId) return;
  const asset = await db.assets.get(assetId);
  if (!asset) return;
  const rect = stageContainer.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  addPlacedItem(asset, x - (asset.defaultWidth||160)/2, y - (asset.defaultHeight||160)/2);
});

/* ---------------------------------------------------------------------
   SEED CATALOG — generic, resolution-independent AV icon library.
   These are simple vector shapes (not fixed-aspect photos), so every item
   drags in at a sensible default size and then scales freely to whatever
   the booth actually needs — a "monitor" here is just a rectangle, not a
   specific model.
--------------------------------------------------------------------- */
const GOLD = "#E8C97A", TEAL = "#4FD1C5", GLASS = `${TEAL}" fill-opacity="0.18`;

function ports(n, startX, y, w, h, gap){
  return Array.from({length:n}).map((_,i) =>
    `<rect x="${startX + i*(w+gap)}" y="${y}" width="${w}" height="${h}" rx="2" fill="${GOLD}"/>`
  ).join("");
}

function svgToDataUrl(svg){
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

async function rasterizeSvg(svg, targetW){
  const img = await loadImageFromSrc(svgToDataUrl(svg));
  const aspect = img.naturalHeight / img.naturalWidth || 1;
  const w = targetW, h = Math.round(targetW * aspect);
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);
  const image = await new Promise(res => canvas.toBlob(res, "image/png"));

  const tW = 160, tH = Math.round(160 * aspect);
  const tCanvas = document.createElement("canvas");
  tCanvas.width = tW; tCanvas.height = tH;
  tCanvas.getContext("2d").drawImage(img, 0, 0, tW, tH);
  const thumbnail = await new Promise(res => tCanvas.toBlob(res, "image/png"));

  return { image, thumbnail };
}

async function seedCatalogIfNeeded(){
  const settingsRow = await db.settings.get("app");
  // Migrate from the old boolean flag: anyone already seeded had v1 items only.
  let appliedVersion = (settingsRow && settingsRow.catalogSeedVersion) || 0;
  if (!appliedVersion && settingsRow && settingsRow.catalogSeeded) appliedVersion = 1;

  const pending = SEED_LIBRARY.filter(def => def.version > appliedVersion);
  if (!pending.length) {
    if (appliedVersion !== (settingsRow && settingsRow.catalogSeedVersion)) {
      await db.settings.put({ ...(settingsRow || { id: "app" }), catalogSeedVersion: appliedVersion });
    }
    return;
  }

  for (const def of pending) {
    const { image, thumbnail } = await rasterizeSvg(def.svg, 320);
    await db.assets.add({
      name: def.name, category: def.category, source: "catalog",
      aiHint: def.aiHint || "",
      image, thumbnail,
      defaultWidth: def.defaultWidth, defaultHeight: def.defaultHeight,
      createdAt: Date.now()
    });
  }
  const maxVersion = Math.max(...SEED_LIBRARY.map(d => d.version));
  await db.settings.put({ ...(settingsRow || { id: "app" }), catalogSeedVersion: maxVersion });
}

function getImageDimensions(file){
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { resolve({width:img.naturalWidth, height:img.naturalHeight}); URL.revokeObjectURL(url); };
    img.src = url;
  });
}
function makeThumbnail(file, maxSize){
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize/img.naturalWidth, maxSize/img.naturalHeight, 1);
      const w = Math.round(img.naturalWidth*scale), h = Math.round(img.naturalHeight*scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, "image/png");
    };
    img.src = url;
  });
}

async function renderBOM(){
  const el = document.getElementById("bom-content");
  if (!state.layout.length) {
    el.innerHTML = '<p id="bom-empty">No items placed yet.</p>';
    return;
  }
  const counts = new Map();
  state.layout.forEach(item => counts.set(item.assetId, (counts.get(item.assetId)||0)+1));
  const assetIds = [...counts.keys()];
  const assets = await db.assets.bulkGet(assetIds);
  const rows = assets.map((a,i) => a ? ({name:a.name, category:a.category, qty:counts.get(assetIds[i])}) : null)
    .filter(Boolean)
    .sort((a,b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  if (!rows.length) { el.innerHTML = '<p id="bom-empty">No items placed yet.</p>'; return; }

  let html = '<table><thead><tr><th>Qty</th><th>Item</th><th>Category</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr><td>${r.qty}x</td><td>${escapeHtml(r.name)}</td><td style="color:rgba(255,255,255,.5)">${escapeHtml(r.category)}</td></tr>`;
  });
  html += "</tbody></table>";
  el.innerHTML = html;
}

/* ---------------------------------------------------------------------
   AI RENDER (Gemini 2.5 Flash Image / "Nano Banana")
   Sends a flattened snapshot of the current layout as a reference image
   and asks Gemini to re-render it as a photorealistic booth photo while
   preserving item positions, proportions, and counts. This is a
   presentation output — the vector layout stays the source of truth for
   the BOM and exact placement, since generative renders can drift slightly
   run to run.
--------------------------------------------------------------------- */
const GEMINI_MODEL = "gemini-3.1-flash-image"; // default / fallback — actual model used is read from Settings

const AI_RENDER_PROMPT = `This image is a flat 2D schematic mockup of a trade show / AV booth layout,
built from simple placeholder icons on a floor plan or booth photo background.

Re-render this as a single photorealistic, professional trade show booth photograph:
- Keep every item in the exact same position, scale, and proportion as shown
- Do not add, remove, duplicate, or move any items
- An "ITEM LEGEND" is provided below identifying exactly what each placeholder icon
  represents, roughly where it sits in the frame, and its drawn size. Use these
  identities directly — do NOT guess an item's type from its silhouette alone, since
  several placeholder icons look visually similar (e.g. a touch kiosk's pedestal is
  NOT an art/museum pedestal — render it as an interactive touchscreen kiosk on a
  slim support stand)
- CRITICAL — SIZE: the user has deliberately drawn each item at the exact footprint
  they want it to occupy in the final booth. The size given for each item in the
  legend (as a percentage of the frame) is authoritative. Do NOT default to a
  "standard" or "typical" real-world size for that equipment category — if the user
  drew a display larger or smaller than a standard unit, render it at that drawn
  size, scaled consistently against the other items and the background
- Replace each flat icon with a realistic version of its labeled equipment type, using
  neutral modern materials (matte black, brushed aluminum, dark glass) unless the
  background image implies a different finish
- Add realistic contact shadows, soft ambient occlusion, and reflections appropriate
  to a well-lit indoor trade show hall
- Match the perspective and lighting of the background/floor plan if one is visible
- Professional product photography quality, sharp focus, no text or watermarks`;

/** Builds a per-item "what is this, where, and how big" legend so Gemini doesn't
 *  have to guess an item's identity or scale from icon shape alone (source of
 *  prior misreads, e.g. a kiosk pedestal read as an art pedestal). */
async function buildItemLegend(){
  const rows = await Promise.all(state.layout.map(async (item, i) => {
    const asset = await db.assets.get(item.assetId);
    if (!asset) return null;
    const cx = Math.round(((item.x + item.width / 2) / STAGE_W) * 100);
    const cy = Math.round(((item.y + item.height / 2) / STAGE_H) * 100);
    const wPct = Math.round((item.width / STAGE_W) * 100);
    const hPct = Math.round((item.height / STAGE_H) * 100);
    const hint = asset.aiHint ? ` — ${asset.aiHint}` : "";
    return `${i + 1}. "${asset.name}" (${asset.category})${hint}\n   Position: ~${cx}% from left, ~${cy}% from top. Size: ~${wPct}% of frame width × ${hPct}% of frame height. Rotation: ${Math.round(item.rotation)}°.`;
  }));
  return rows.filter(Boolean).join("\n");
}

document.getElementById("ai-render-btn").addEventListener("click", async () => {
  const btn = document.getElementById("ai-render-btn");
  const settingsRow = await db.settings.get("app");
  const apiKey = settingsRow && settingsRow.geminiApiKey;
  const model = (settingsRow && settingsRow.geminiModel) || GEMINI_MODEL;
  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

  if (!apiKey) {
    showToast("Add a Gemini API key in Settings first");
    openSettingsModal();
    return;
  }
  if (!state.layout.length) {
    showToast("Place at least one item before rendering");
    return;
  }

  transformer.nodes([]); itemLayer.draw();
  const layoutDataUrl = stage.toDataURL({ pixelRatio: 2, mimeType: "image/png" });
  const base64 = layoutDataUrl.split(",")[1];
  const legend = await buildItemLegend();
  let fullPrompt = `${AI_RENDER_PROMPT}\n\nITEM LEGEND:\n${legend}`;
  if (state.meta.aiNotes && state.meta.aiNotes.trim()) {
    fullPrompt += `\n\nADDITIONAL INSTRUCTIONS FROM THE USER (apply these on top of everything above):\n${state.meta.aiNotes.trim()}`;
  }

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = "Rendering… (10–30s)";

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: fullPrompt },
            { inline_data: { mime_type: "image/png", data: base64 } }
          ]
        }],
        generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
      })
    });

    if (res.status === 429) {
      showToast("Quota/billing limit hit on this model — open Settings to try a different one, or enable billing at aistudio.google.com");
      return;
    }
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Gemini API error (${res.status}): ${errText.slice(0, 200)}`);
    }

    const data = await res.json();
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const imagePart = parts.find(p => p.inlineData || p.inline_data);
    const inline = imagePart && (imagePart.inlineData || imagePart.inline_data);

    if (!inline) {
      const textPart = parts.find(p => p.text);
      throw new Error(textPart ? `No image returned: ${textPart.text.slice(0,200)}` : "No image returned by Gemini");
    }

    const mime = inline.mimeType || inline.mime_type || "image/png";
    const renderedDataUrl = `data:${mime};base64,${inline.data}`;
    showAiRenderResult(renderedDataUrl);
  } catch (err) {
    console.error(err);
    showToast("AI render failed — " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
});

function loadImageFromSrc(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function compositeWithHeaderFooter(layoutImg, meta, size){
  const HEADER_H = meta.showMetadata ? 130 : 0;
  const FOOTER_H = (meta.showMetadata && meta.notes) ? 90 : 0;
  const PAD = 40;
  const canvas = document.createElement("canvas");
  canvas.width = size.width;
  canvas.height = size.height + HEADER_H + FOOTER_H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (HEADER_H) {
    ctx.fillStyle = "#0B0F14";
    ctx.fillRect(0,0,canvas.width,HEADER_H);
    ctx.fillStyle = "#E8C97A";
    ctx.font = "bold 40px 'Playfair Display', serif";
    ctx.fillText(meta.companyName || "AIM AV", PAD, HEADER_H/2 - 6);
    ctx.fillStyle = "#CBD5D9";
    ctx.font = "22px 'DM Sans', sans-serif";
    ctx.fillText(`Client: ${meta.clientName || "—"}    ${new Date().toLocaleDateString()}`, PAD, HEADER_H/2 + 34);
  }

  ctx.drawImage(layoutImg, 0, HEADER_H, size.width, size.height);

  if (FOOTER_H) {
    ctx.fillStyle = "#0B0F14";
    ctx.fillRect(0, HEADER_H+size.height, canvas.width, FOOTER_H);
    ctx.fillStyle = "#CBD5D9";
    ctx.font = "18px 'DM Sans', sans-serif";
    wrapText(ctx, meta.notes, PAD, HEADER_H+size.height+30, canvas.width-PAD*2, 24);
  }

  if (meta.showWatermark) {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = "#000000";
    ctx.font = "bold 90px 'DM Sans', sans-serif";
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(-Math.PI/8);
    ctx.textAlign = "center";
    ctx.fillText(meta.companyName || "AIM AV DRAFT", 0, 0);
    ctx.restore();
  }
  return canvas.toDataURL("image/png");
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = (text||"").split(" ");
  let line = "", curY = y;
  words.forEach(word => {
    const test = line + word + " ";
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, curY); line = word + " "; curY += lineHeight;
    } else line = test;
  });
  ctx.fillText(line, x, curY);
}
function downloadDataUrl(dataUrl, filename){
  const a = document.createElement("a");
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

        </div>
        <div class="field">
          <label>AI Render Model</label>
          <select id="m-gemini-model" style="width:100%;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;">
            <option value="gemini-3.1-flash-image">Nano Banana 2 (gemini-3.1-flash-image) — recommended</option>
            <option value="gemini-3.1-flash-lite-image">Nano Banana 2 Lite — fastest / cheapest</option>
            <option value="gemini-3-pro-image">Nano Banana Pro — highest quality, slower/pricier</option>
            <option value="gemini-2.5-flash-image">Nano Banana (legacy 2.5) — being phased out by Google</option>
          </select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn primary" id="m-save">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector("#m-company").value = state.meta.companyName;
  overlay.querySelector("#m-client").value = state.meta.clientName;
  overlay.querySelector("#m-notes").value = state.meta.notes;
  overlay.querySelector("#m-metadata").checked = state.meta.showMetadata;
  overlay.querySelector("#m-watermark").checked = state.meta.showWatermark;
  db.settings.get("app").then(s => {
    overlay.querySelector("#m-gemini-key").value = (s && s.geminiApiKey) || "";
    overlay.querySelector("#m-gemini-model").value = (s && s.geminiModel) || GEMINI_MODEL;
  });

  const close = () => overlay.remove();
  overlay.querySelector(".modal-close").addEventListener("click", close);
  overlay.querySelector("#m-cancel").addEventListener("click", close);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  overlay.querySelector("#m-save").addEventListener("click", async () => {
    state.meta = {
      companyName: overlay.querySelector("#m-company").value,
      clientName: overlay.querySelector("#m-client").value,
      notes: overlay.querySelector("#m-notes").value,
      showMetadata: overlay.querySelector("#m-metadata").checked,
      showWatermark: overlay.querySelector("#m-watermark").checked,
    };
    const existing = await db.settings.get("app");
    await db.settings.put({
      ...(existing || { id: "app" }),
      geminiApiKey: overlay.querySelector("#m-gemini-key").value.trim(),
      geminiModel: overlay.querySelector("#m-gemini-model").value,
    });
    markDirty();
    close();
  });
}

/* ---------------------------------------------------------------------
   BACKUP / RESTORE (entire Dexie DB <-> single JSON file)
--------------------------------------------------------------------- */
const BLOB_FIELDS = { assets: ["thumbnail","image"], projects: ["baseImage"] };

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function base64ToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return res.blob();
}

document.getElementById("backup-btn").addEventListener("click", async () => {
  const dump = { version: db.verno, exportedAt: Date.now(), tables: {} };
  for (const table of db.tables) {
    const rows = await table.toArray();
    const blobFields = BLOB_FIELDS[table.name] || [];
    dump.tables[table.name] = await Promise.all(rows.map(async row => {
      const copy = { ...row };
      for (const field of blobFields) {
        if (copy[field] instanceof Blob) {
          copy[field] = await blobToBase64(copy[field]);
          copy["__" + field + "IsBlob"] = true;
        }
      }
      return copy;
    }));
  }
  const json = JSON.stringify(dump, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `aim-av-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
});

document.getElementById("restore-input").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const text = await file.text();
  const dump = JSON.parse(text);
  await db.transaction("rw", db.tables, async () => {
    for (const table of db.tables) {
      const rows = dump.tables[table.name] || [];
      const blobFields = BLOB_FIELDS[table.name] || [];
      const restored = await Promise.all(rows.map(async row => {
        const copy = { ...row };
        for (const field of blobFields) {
          if (copy["__" + field + "IsBlob"]) {
            copy[field] = await base64ToBlob(copy[field]);
            delete copy["__" + field + "IsBlob"];
          }
        }
        return copy;
      }));
      await table.clear();
      if (restored.length) await table.bulkPut(restored);
    }
  });
  e.target.value = "";
  showToast("Restore complete — reloading…");
  setTimeout(() => location.reload(), 800);
});

/* ---------------------------------------------------------------------
   UNDO / REDO buttons + keyboard shortcuts
--------------------------------------------------------------------- */
document.getElementById("undo-btn").addEventListener("click", undo);
document.getElementById("redo-btn").addEventListener("click", redo);
document.getElementById("flip-h-btn").addEventListener("click", () => flipSelected("x"));
document.getElementById("flip-v-btn").addEventListener("click", () => flipSelected("y"));
document.getElementById("rotate-ccw-btn").addEventListener("click", () => rotateSelectedBy(-90));
document.getElementById("rotate-cw-btn").addEventListener("click", () => rotateSelectedBy(90));
document.getElementById("rotation-input").addEventListener("change", (e) => {
  const val = parseFloat(e.target.value);
  if (!isNaN(val)) setSelectedRotation(val);
});

window.addEventListener("keydown", (e) => {
  const typing = document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA";
  if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redo(); }
  if (typing) return;
  if (e.key === "Delete" || e.key === "Backspace") { if (state.selectedInstanceId) deleteSelected(); }
  if (e.key === "[") rotateSelectedBy(-15);   // fine rotation, counterclockwise
  if (e.key === "]") rotateSelectedBy(15);    // fine rotation, clockwise
  if (e.key.toLowerCase() === "h") flipSelected("x");
  if (e.key.toLowerCase() === "v") flipSelected("y");
});
function deleteSelected(){
  const id = state.selectedInstanceId;
  if (!id) return;
  state.layout = state.layout.filter(it => it.instanceId !== id);
  const node = konvaNodesByInstanceId.get(id);
  if (node) node.destroy();
  konvaNodesByInstanceId.delete(id);
  transformer.nodes([]);
  state.selectedInstanceId = null;
  itemLayer.draw();
  syncRotationInput();
  pushHistory();
  renderBOM();
  markDirty();
}

/* ---------------------------------------------------------------------
   MISC HELPERS
--------------------------------------------------------------------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 5000);
}
